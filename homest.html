<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


  <title>Web-System</title>
  <link rel="stylesheet" href="student.css">

 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
      <button class="btn btn-outline-light" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar" aria-controls="sidebar">
        <i class="bi bi-list"></i>
      </button>
      <span class="navbar-brand fw-bold mx-3">Student</span>
      <a href="index.html" class="ms-auto text-white text-decoration-none">
        <i class="bi bi-power"></i> Logout
      </a>
    </div>
  </nav>


  <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebar">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Menu</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0">

      <div class="text-center p-3 border-bottom">
        <img id="profilePhotoMenu" alt="Profile" class="rounded-circle mb-2" width="80" height="80">
        <h6 id="welcomeMsgs"></h6>
            <small id="studentID"></small> <br>
        <small id="studentStrand"></small>
      </div>

 
<div class="list-group list-group-flush" id="menuList">
  <button class="list-group-item list-group-item-action text-start menu-btn" 
    data-page="profilePage" data-bs-dismiss="offcanvas">
    <i class="bi bi-person-fill me-2"></i> My Profile
  </button>
  <button class="list-group-item list-group-item-action text-start menu-btn" 
    data-page="announcementPage" data-bs-dismiss="offcanvas">
    <i class="bi bi-megaphone-fill me-2"></i> View Announcement
  </button>
  <button class="list-group-item list-group-item-action text-start menu-btn" 
    data-page="servicePage" data-bs-dismiss="offcanvas">
    <i class="bi bi-file-earmark-text-fill me-2"></i> Service Requests
  </button>
</div>


    </div>
  </div>


<div class="container mt-4">
 

    <div id="defaultPage">
      <h3 id="welcomeMsg">Welcome!</h3>
      <p>Select a menu option to continue.</p>
    </div>

 



    <div id="profilePage" class="d-none">
     
      <h3 class="mb-3">My Profile</h3>
         <div id="breadcrumb" class="mb-3"></div>
      <div class="row">
 
        <div id="leftProfileCol" class="col-md-4 mb-3">
          <div id="leftProfileCard" class="card p-3 text-center shadow-sm ">

<img id="profilePhotoCard" src="" class="rounded-circle mx-auto mb-3" width="100" alt="profile">
            <h3 id="welcomeMsgss"></h3>
            <p><strong>Student ID:</strong> <span id="studentid"></span></p>
            <p><strong>Email:</strong> <span id="studentEmail"></span></p>
            <p><strong>Date of Birth:</strong> <span id="studentDOB"></span></p>
            <button id="editProfileBtn" class="btn btn-primary">Edit Profile</button>
          </div>
        </div>
      
        <div class="col-md-8">
          <div class="d-flex gap-3 flex-wrap">
            <button id="viewPersonalBtn" class="btn btn-light flex-border">
              <i class="bi bi-person-vcard"></i> 
            </button>
            <button id="viewGradesBtn" class="btn btn-light flex-fill border">
              <i class="bi bi-journal-bookmark-fill"></i> View grades
            </button>
            <button id="viewClearanceBtn" class="btn btn-light flex-fill border">
              <i class="bi bi-check-circle"></i> View clearance status
            </button>
          </div>
          <div id="profileContent" class="mt-4"></div>
        </div>
      </div>
    </div>

<div id="announcementPage" class="d-none">
  <h3>📢  View Announcements</h3>
  <div id="studentAnnouncements"></div>


  <div class="modal fade" id="announcementModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="announcementModalTitle">Announcement</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p id="announcementModalContent"></p>
          <p><strong>Date:</strong> <span id="announcementModalDate"></span></p>
        </div>
        <div class="modal-footer">
          <button id="announcementModalSaveBtn" class="btn btn-success">Save Announcement</button>
          <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>
</div>



<div id="servicePage" class="d-none">
  <h3>Service Requests</h3>

  <div class="card p-3 mb-3 shadow-sm">
    <div class="mb-2">
      <select id="requestType" class="form-select">
        <option value="">Select Request</option>
        <option value=" SF10"> SF10</option>
        <option value=" SF9">SF9</option>
        <option value=" Good Moral">Good Moral</option>
        <option value=" ID">ID</option>
        <option value="Certification">Certification</option>
      </select>
    </div>
    <button id="submitRequestBtn" class="btn btn-primary">Submit Request</button>
  </div>

  <h5 class="mt-3">My Requests</h5>
  <table class="table table-bordered" id="myRequestsTable">
    <thead>
      <tr>
        <th>Request Type</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>







  <div class="modal fade" id="editProfileModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Profile</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3 text-center">
            <img id="editProfilePhotoPreview" src="logo1.png" alt="preview" style="width:120px;height:120px;object-fit:cover;border-radius:60px;">
          </div>
          <div class="mb-3">
            <label class="form-label">Change Photo</label>
            <input id="editPhotoInput" type="file" accept="image/*" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input id="editEmail" type="email" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Date of Birth</label>
            <input id="editDob" type="date" class="form-control">
          </div>
        </div>
        <div class="modal-footer">
          <button id="saveProfileBtn" type="button" class="btn btn-primary">Save changes</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script  src="menu.js">
  
    </script>

  <script type="module" src="web-student.js"></script>  
</body>
</html>
